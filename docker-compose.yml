version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: elo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: elo_academico
      MYSQL_USER: elo_user
      MYSQL_PASSWORD: elo_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - elo_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elo_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: elo_academico
      DB_USER: elo_user
      DB_PASSWORD: elo_password
      JWT_SECRET: ${JWT_SECRET:-elo_academico_jwt_secret_troque_em_producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3000
      NODE_ENV: production
    networks:
      - elo_network
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elo_frontend
    restart: unless-stopped
    networks:
      - elo_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: elo_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
      - frontend
    networks:
      - elo_network

volumes:
  db_data:
  backend_logs:

networks:
  elo_network:
    driver: bridge
